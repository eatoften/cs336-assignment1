<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title description">
  <title id="title">KV-cache decoding benchmark</title>
  <desc id="description">Two grouped bar charts compare uncached and KV-cached end-to-end decoding throughput and peak extra PyTorch CUDA memory allocation for prompt lengths 16, 64, and 128 tokens.</desc>
  <style>
    .title { font: 700 30px Inter, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 16px Inter, "Segoe UI", Arial, sans-serif; fill: #475569; }
    .panel-title { font: 700 18px Inter, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .axis-label { font: 500 13px Inter, "Segoe UI", Arial, sans-serif; fill: #475569; }
    .tick { font: 400 12px Inter, "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .value { font: 600 12px "SFMono-Regular", Consolas, monospace; fill: #0f172a; }
    .annotation { font: 700 12px Inter, "Segoe UI", Arial, sans-serif; fill: #1d4ed8; }
    .legend { font: 500 13px Inter, "Segoe UI", Arial, sans-serif; fill: #334155; }
    .note { font: 400 12px Inter, "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .axis { stroke: #94a3b8; stroke-width: 1.2; }
    .uncached { fill: #94a3b8; }
    .cached { fill: #2563eb; }
  </style>

  <rect width="1200" height="680" fill="#ffffff"/>

  <text class="title" x="64" y="50">KV-cache decoding benchmark</text>
  <text class="subtitle" x="64" y="80">RTX 4060 Laptop GPU · batch 1 · FP32 · 128 generated tokens · median of 20 measured runs</text>

  <rect class="uncached" x="64" y="102" width="18" height="12" rx="2"/>
  <text class="legend" x="90" y="113">Uncached</text>
  <rect class="cached" x="180" y="102" width="18" height="12" rx="2"/>
  <text class="legend" x="206" y="113">KV cached</text>

  <text class="panel-title" x="80" y="148">End-to-end throughput</text>
  <text class="axis-label" x="80" y="168">Generated tokens per second</text>

  <line class="grid" x1="80" y1="500" x2="570" y2="500"/>
  <line class="grid" x1="80" y1="419" x2="570" y2="419"/>
  <line class="grid" x1="80" y1="338" x2="570" y2="338"/>
  <line class="grid" x1="80" y1="257" x2="570" y2="257"/>
  <line class="grid" x1="80" y1="176" x2="570" y2="176"/>
  <line class="axis" x1="80" y1="176" x2="80" y2="500"/>
  <line class="axis" x1="80" y1="500" x2="570" y2="500"/>

  <text class="tick" x="68" y="504" text-anchor="end">0</text>
  <text class="tick" x="68" y="423" text-anchor="end">50</text>
  <text class="tick" x="68" y="342" text-anchor="end">100</text>
  <text class="tick" x="68" y="261" text-anchor="end">150</text>
  <text class="tick" x="68" y="180" text-anchor="end">200</text>

  <g aria-label="Prompt length 16: uncached 167.72 tokens per second, cached 192.43 tokens per second">
    <rect class="uncached" x="115" y="228" width="46" height="272" rx="3"/>
    <rect class="cached" x="169" y="188" width="46" height="312" rx="3"/>
    <text class="value" x="138" y="218" text-anchor="middle">167.72</text>
    <text class="value" x="192" y="178" text-anchor="middle">192.43</text>
    <text class="annotation" x="192" y="158" text-anchor="middle">1.15×</text>
    <text class="axis-label" x="165" y="525" text-anchor="middle">16</text>
  </g>

  <g aria-label="Prompt length 64: uncached 164.01 tokens per second, cached 188.21 tokens per second">
    <rect class="uncached" x="270" y="234" width="46" height="266" rx="3"/>
    <rect class="cached" x="324" y="195" width="46" height="305" rx="3"/>
    <text class="value" x="293" y="224" text-anchor="middle">164.01</text>
    <text class="value" x="347" y="185" text-anchor="middle">188.21</text>
    <text class="annotation" x="347" y="165" text-anchor="middle">1.15×</text>
    <text class="axis-label" x="320" y="525" text-anchor="middle">64</text>
  </g>

  <g aria-label="Prompt length 128: uncached 156.77 tokens per second, cached 176.53 tokens per second">
    <rect class="uncached" x="425" y="246" width="46" height="254" rx="3"/>
    <rect class="cached" x="479" y="214" width="46" height="286" rx="3"/>
    <text class="value" x="448" y="236" text-anchor="middle">156.77</text>
    <text class="value" x="502" y="204" text-anchor="middle">176.53</text>
    <text class="annotation" x="502" y="184" text-anchor="middle">1.13×</text>
    <text class="axis-label" x="475" y="525" text-anchor="middle">128</text>
  </g>
  <text class="axis-label" x="325" y="551" text-anchor="middle">Prompt length (tokens)</text>

  <text class="panel-title" x="650" y="148">Peak extra PyTorch CUDA allocation</text>
  <text class="axis-label" x="650" y="168">MiB above the resident model allocation</text>

  <line class="grid" x1="650" y1="500" x2="1140" y2="500"/>
  <line class="grid" x1="650" y1="403" x2="1140" y2="403"/>
  <line class="grid" x1="650" y1="306" x2="1140" y2="306"/>
  <line class="grid" x1="650" y1="209" x2="1140" y2="209"/>
  <line class="axis" x1="650" y1="160" x2="650" y2="500"/>
  <line class="axis" x1="650" y1="500" x2="1140" y2="500"/>

  <text class="tick" x="638" y="504" text-anchor="end">0</text>
  <text class="tick" x="638" y="407" text-anchor="end">10</text>
  <text class="tick" x="638" y="310" text-anchor="end">20</text>
  <text class="tick" x="638" y="213" text-anchor="end">30</text>

  <g aria-label="Prompt length 16: uncached 13.86 MiB, cached 4.55 MiB">
    <rect class="uncached" x="685" y="365" width="46" height="135" rx="3"/>
    <rect class="cached" x="739" y="456" width="46" height="44" rx="3"/>
    <text class="value" x="708" y="355" text-anchor="middle">13.86</text>
    <text class="value" x="762" y="446" text-anchor="middle">4.55</text>
    <text class="annotation" x="735" y="335" text-anchor="middle">−67.2%</text>
    <text class="axis-label" x="735" y="525" text-anchor="middle">16</text>
  </g>

  <g aria-label="Prompt length 64: uncached 20.68 MiB, cached 6.06 MiB">
    <rect class="uncached" x="840" y="299" width="46" height="201" rx="3"/>
    <rect class="cached" x="894" y="441" width="46" height="59" rx="3"/>
    <text class="value" x="863" y="289" text-anchor="middle">20.68</text>
    <text class="value" x="917" y="431" text-anchor="middle">6.06</text>
    <text class="annotation" x="890" y="269" text-anchor="middle">−70.7%</text>
    <text class="axis-label" x="890" y="525" text-anchor="middle">64</text>
  </g>

  <g aria-label="Prompt length 128: uncached 32.78 MiB, cached 8.95 MiB">
    <rect class="uncached" x="995" y="182" width="46" height="318" rx="3"/>
    <rect class="cached" x="1049" y="413" width="46" height="87" rx="3"/>
    <text class="value" x="1018" y="172" text-anchor="middle">32.78</text>
    <text class="value" x="1072" y="403" text-anchor="middle">8.95</text>
    <text class="annotation" x="1045" y="154" text-anchor="middle">−72.7%</text>
    <text class="axis-label" x="1045" y="525" text-anchor="middle">128</text>
  </g>
  <text class="axis-label" x="895" y="551" text-anchor="middle">Prompt length (tokens)</text>

  <line x1="64" y1="578" x2="1136" y2="578" stroke="#e2e8f0" stroke-width="1"/>
  <text class="note" x="64" y="604">Timing includes prompt prefill, Python decoding, tensor construction, greedy sampling, model execution, and CUDA synchronization.</text>
  <text class="note" x="64" y="627">Same 160K-step TinyStories checkpoint; fixed 128-token generation; 5 explicit warm-ups; 20 measured runs; median reported.</text>
  <text class="note" x="64" y="650">All cached and uncached runs produced identical greedy token IDs.</text>
</svg>
